services:
  db:
    image: postgres:16-alpine
    container_name: chat-pg
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: fastapi_chat_db
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - chat-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_chat_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chat-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chat-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: chat-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PWD: "123456"
      DB_NAME: fastapi_chat_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      API_TOKEN: mytoken123456
      DOCKER_CONTAINER: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 应用自身健康检查
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - chat-net

volumes:
  pg_data:
  redis_data:

networks:
  chat-net:
    driver: bridge
